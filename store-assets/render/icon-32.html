<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; width: 32px; height: 32px; background: #faf9f5; overflow: hidden; }
      body { display: grid; place-items: center; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .icon {
        width: 28px;
        height: 28px;
        border: 1px solid #141413;
        border-radius: 6px;
        background: #fff;
        display: grid;
        place-items: center;
        position: relative;
        box-shadow: inset 0 0 0 1px #e6e3da;
      }
      .brace { font-size: 15px; line-height: 1; color: #d97757; font-weight: 600; }
      .rule {
        position: absolute;
        left: 7px;
        right: 7px;
        height: 1px;
        background: #788c5d;
        border-radius: 99px;
      }
      .top { top: 9px; }
      .bottom { bottom: 9px; }
    </style>
  </head>
  <body><div class="icon"><span class="rule top"></span><span class="brace">{}</span><span class="rule bottom"></span></div></body>
</html>
